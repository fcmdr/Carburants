name: dbt CD (Production Deploy)

on:
  push:
    branches: [main]
    paths:
      - 'carburants_dbt/**'
      - '.github/workflows/cd.yml'

  workflow_dispatch:
    inputs:
      full_refresh:
        description: 'Run full refresh (rebuild all tables)'
        required: false
        default: 'false'
        type: boolean

env:
  DBT_PROFILES_DIR: ${{ github.workspace }}/carburants_dbt
  SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
  SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
  SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dbt
        run: pip install dbt-snowflake elementary-data

      - name: Create profiles.yml for prod
        working-directory: carburants_dbt
        run: |
          cat > profiles.yml << EOF
          carburants:
            target: prod
            outputs:
              prod:
                type: snowflake
                account: "$SNOWFLAKE_ACCOUNT"
                user: "$SNOWFLAKE_USER"
                password: "$SNOWFLAKE_PASSWORD"
                role: TRANSFORMER
                database: CARBURANTS_PROD
                warehouse: COMPUTE_WH
                schema: PUBLIC
                threads: 8
          EOF

      - name: Install dbt packages
        working-directory: carburants_dbt
        run: dbt deps

      - name: Load seeds
        working-directory: carburants_dbt
        run: dbt seed

      - name: Run dbt build
        working-directory: carburants_dbt
        run: |
          if [ "${{ github.event.inputs.full_refresh }}" == "true" ]; then
            echo "Running full refresh build"
            dbt build --full-refresh
          else
            echo "Running incremental build"
            dbt build
          fi

      - name: Run snapshots
        working-directory: carburants_dbt
        run: dbt snapshot

      - name: Run Elementary
        working-directory: carburants_dbt
        continue-on-error: true
        run: |
          edr report --days-back 7

      - name: Generate documentation
        working-directory: carburants_dbt
        run: dbt docs generate

      - name: Upload production manifest
        uses: actions/upload-artifact@v4
        with:
          name: production-manifest
          path: |
            carburants_dbt/target/manifest.json
            carburants_dbt/target/catalog.json

      - name: Deploy docs to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: carburants_dbt/target
          destination_dir: docs

  notify:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: deploy
    if: failure()
    steps:
      - name: Send notification
        run: |
          echo "Deployment failed! Check the workflow logs."
          # Add Slack/Teams notification here if needed
          # curl -X POST -H 'Content-type: application/json' \
          #   --data '{"text":"dbt production deployment failed!"}' \
          #   ${{ secrets.SLACK_WEBHOOK_URL }}
