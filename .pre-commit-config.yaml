# Pre-commit hooks for the entire Carburants project
# Focuses on security - preventing accidental credential commits

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      # Detect private keys (SSH, PGP, etc.)
      - id: detect-private-key

      # Prevent large files from being committed
      - id: check-added-large-files
        args: ['--maxkb=1000']

      # Check for files that would conflict in case-insensitive filesystems
      - id: check-case-conflict

      # Check for merge conflict markers
      - id: check-merge-conflict

  # Detect secrets in code (API keys, passwords, tokens)
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: \.env\.template$|secrets\.toml\.template$
